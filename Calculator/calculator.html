<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport"  content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="/calculator.css">

    </head>

    <body>

        <div id="calculator">
            <input type="text" id="display" style="font-size: 20px;" readonly>
            <div class="buttonC">
            <button class ="button" onclick="inputVal('C')">C</button>
            <button class ="button" onclick="inputVal('1')">1</button>
            <button class ="button" onclick="inputVal('2')">2</button>
            <button class ="button" onclick="inputVal('=')">=</button>
            <button class ="button" onclick="inputVal('3')">3</button>
            <button class ="button" onclick="inputVal('4')">4</button>
            <button class ="button" onclick="inputVal('+')">+</button>
            <button class ="button" onclick="inputVal('5')">5</button>
            <button class ="button" onclick="inputVal('6')">6</button>
            <button class ="button" onclick="inputVal('-')">-</button>
            <button class ="button" onclick="inputVal('7')">7</button>
            <button class ="button" onclick="inputVal('8')">8</button>
            <button class ="button" onclick="inputVal('*')">*</button>
            <button class ="button" onclick="inputVal('9')">9</button>
            <button class ="button" onclick="inputVal('0')">0</button>
            <button class ="button" onclick="inputVal('/')">/</button>
            <button class ="button" onclick="inputVal('.')">.</button>
            <button class ="buttonX" onclick="backspace()">⌫</button>
            </div>



        </div>
         

        <script>
        let inputvalue = '';
function inputVal(x){
   // let x = document.querySelectorAll('.button').value;
    if(x!= "C" && x!="="){
        inputvalue += x;
    }
    document.querySelector('#display').value = inputvalue;
    if(x== "="){
        document.querySelector("#display").value = inputvalue+`=`+eval(inputvalue);
        inputvalue= eval(inputvalue);
    }
    if(x == "C"){
        inputvalue= "";
       // document.querySelector("#display").value = inputvalue;
    }
    document.querySelector("#display").value = inputvalue;
}
 function backspace(){
        inputvalue = inputvalue.slice(0,-1);
        document.querySelector("#display").value = inputvalue;
    }
</script>
    </body>

</html>

<!-- 
in input field -> To disable the input:
disable -> user can't type and field looks inactive.
readonly -> user can't type but field looks normal. 

----------------------------------------------------------------------------------------------------

Repeated querySelector calls
Current:
document.querySelector("#display").value = inputvalue;  =>many times.

Better:
let display = document.querySelector("#display");

Then:
display.value = inputvalue;

--------------------------------------------------------------------------------------------------------

Slice
let fruit = "Mango is a Summer Fruit.";
slice() - Extract part of String; slice(a,b) -> a included, b excluded
console.log(fruit.slice(0,3)); //Man
console.log(fruit.slice(6,17)); // is a Summer
//if secomd parameter is omitted
console.log(fruit.slice(6)); //is a summer fruit
//if parameter negative - Position is counted from the end of the String 
console.log(fruit.slice(-6));  //Fruit



-->
