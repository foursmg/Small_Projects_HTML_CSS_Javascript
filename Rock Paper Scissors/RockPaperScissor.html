<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Paper Scissor</title>
        <link rel="stylesheet" href="/Small_Projects_HTML_CSS_JavaScript/Rock Paper Scissors/RockPS.css">
    </head>
    <body>
        <h1>Rock Paper Scissor</h1>
    
            <div id="container">
            <div id="leftboxes">
                <button type="text" id="rock" onclick="game('rock')">🪨</button>
                <button type="text" id="paper" onclick="game('paper')">📄</button>
                <button type="text" id="scissor" onclick="game('scissor')">✂️</button>
                <p id="userScore", style="margin-top: 0; margin-left: 50px;" >You: 0</p>
            </div>
            
            <div id="display">
                <span id="userdisplay">You</span>
                <span id="botdisplay">Bot</span>
                <span id="winsdisplay">wins</span>
                <div id="reset">
                <button style="font-size: larger; margin-top: 110px;" id='rest', onclick="reset()">Rest</button>
            </div>
            </div>

            
            

            <div id="rightboxes"><button type="text" id="rock1" >🪨</button>
                <button type="text" id="paper1">📄</button>
                <button type="text" id="scissor1">✂️</button>
                <p id="botScore", style="margin-top: 0; margin-left: 40px;">Bot: 0</p> 
            </div>
                
        </div>
        <h2 style="text-align: center; color: darkolivegreen;"id="board"></h2>
        <h3 id="scoreBoard" style="text-align: center; color: slategray;"></h3>
       

        
        <script src="/Small_Projects_HTML_CSS_JavaScript/Rock Paper Scissors/RockPS.js"></script>
    </body>
</html>

<!-- 
<button> → inline-block-like control, sized to content.
<p> → block element, comes with default top/bottom margins.
<span> ->  is meant for inline text and doesn't have the large default margins that <p> has.       

-->
